<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enkrateia Partner Reply</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    :root {
      --bg:#0A0A0F; --surface:#0D0D18; --border:#1A1A2A; --text:#E0E0F0; --muted:#8080A8;
      --accent:#6A90FF; --error:#D04040; --ok:#50C070;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:680px;margin:0 auto;padding:28px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .brand img{width:44px;height:44px;border-radius:12px}
    .brand span{letter-spacing:2px;color:var(--accent);font-weight:700;font-size:11px}
    h1{font-size:28px;margin:0 0 8px}
    p{color:var(--muted);line-height:1.6}
    label{display:block;margin:14px 0 6px;color:var(--text);font-weight:600}
    input,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:#111120;color:var(--text)}
    textarea{min-height:130px;resize:vertical}
    button{margin-top:14px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
    .msg{margin-top:10px;font-size:14px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <div class="brand">
        <img src="/logo.png" alt="Enkrateia logo" />
        <span>ENKRATEIA</span>
      </div>
      <h1>Send support message</h1>
      <p>Your message will be delivered to your partner’s Enkrateia app.</p>
      <form id="reply-form">
        <label for="name">Your name</label>
        <input id="name" type="text" maxlength="80" placeholder="Partner" />

        <label for="message">Message</label>
        <textarea id="message" maxlength="1000" placeholder="Keep going. I'm proud of you."></textarea>

        <button type="submit">Send message</button>
        <p id="msg" class="msg" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <script>
    const ENDPOINT = 'https://jtlhhomzkfiufyoitpfg.functions.supabase.co/partner-reply';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const form = document.getElementById('reply-form');
    const nameInput = document.getElementById('name');
    const messageInput = document.getElementById('message');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.style.color = '';

      const from_name = nameInput.value.trim() || 'Accountability Partner';
      const message = messageInput.value.trim();

      if (!token) {
        msg.textContent = 'Missing secure reply token in this link.';
        msg.style.color = 'var(--error)';
        return;
      }

      if (message.length < 2) {
        msg.textContent = 'Please write at least 2 characters.';
        msg.style.color = 'var(--error)';
        return;
      }

      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, from_name, message }),
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        msg.textContent = body.error || 'Could not send right now.';
        msg.style.color = 'var(--error)';
        return;
      }

      msg.textContent = 'Message sent successfully.';
      msg.style.color = 'var(--ok)';
      messageInput.value = '';
    });
  </script>
</body>
</html>
